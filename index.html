<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Trading Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#070b10;color:#e2e8f0;font-family:'Courier New',monospace;min-height:100vh;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#0d1117;}::-webkit-scrollbar-thumb{background:#1e293b;}
select option{background:#111827;color:#e2e8f0;}
.nav-btn{padding:12px 18px;border:none;background:transparent;color:#475569;font-size:11px;letter-spacing:2px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.nav-btn.active{color:#f59e0b;border-bottom-color:#f59e0b;font-weight:700;}
.pair-btn{padding:8px 16px;border:none;background:transparent;color:#475569;font-size:10px;letter-spacing:2px;cursor:pointer;border-right:1px solid #1e293b;}
.pair-btn.active{background:#1e293b;color:#e2e8f0;}
.card{padding:14px 18px;background:#0d1117;border:1px solid #1e293b;cursor:pointer;margin-bottom:2px;transition:border-color .15s;}
.card:hover{border-color:#334155;}
.btn-primary{padding:9px 22px;background:#f59e0b;border:none;color:#0a0a0f;font-size:10px;letter-spacing:2px;cursor:pointer;font-weight:700;}
.btn-secondary{padding:7px 16px;background:transparent;border:1px solid #334155;color:#94a3b8;font-size:10px;letter-spacing:2px;cursor:pointer;}
.btn-danger{padding:7px 16px;background:transparent;border:1px solid #7f1d1d;color:#f87171;font-size:10px;letter-spacing:2px;cursor:pointer;}
.lbl{font-size:9px;color:#475569;letter-spacing:2px;display:block;margin-bottom:6px;text-transform:uppercase;}
.inp{background:#111827;border:1px solid #1e293b;color:#e2e8f0;padding:10px 14px;font-size:12px;width:100%;outline:none;}
.inp:focus{border-color:#334155;}
.bias-btn{padding:5px 11px;border:1px solid #1e293b;background:transparent;color:#475569;font-size:9px;letter-spacing:1px;cursor:pointer;font-weight:700;}
.result-btn{padding:6px 13px;border:1px solid #1e293b;background:transparent;color:#475569;font-size:11px;cursor:pointer;font-weight:700;}
.field-box{padding:12px 14px;background:#0d1117;border:1px solid #1e293b;margin-bottom:8px;}
.chart-card{background:#0d1117;border:1px solid #1e293b;padding:18px;margin-bottom:14px;}
.chart-title{font-size:9px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;}
.empty{text-align:center;color:#1e293b;padding:60px 0;font-size:11px;letter-spacing:3px;}
.tag{display:inline-block;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:1px;border-radius:2px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var STORAGE_KEY="fx-master-log-v2";
var IMG_KEY="fx-chart-images-v1";
var PAIRS=["XAUUSD","NASDAQ"];
var CANDLE_OPT=["strong bullish","bullish","weak bullish","bullish doji","hammer bullish","strong bearish","bearish","weak bearish","bearish doji","doji"];
var BIAS_OPT=["fully bullish","bullish","mix but more bullish","mix","mix but more bearish","bearish","full bearish"];
var SETUP_OPT=["TS1","TS2","TS3","NO SETUP","(TS1)","(TS2)","(TS3)"];
var ENTRY_OPT=["エントリー","見送り","ノートレード","テスト","ノーセットアップ"];
var RESULT_OPT=["W","L","BE","(W)","(L)","(BE)","---"];
var RULE_OPT=["⭕️","❌","---"];
var DAILY_FIELDS=[
  {key:"pDCandle",label:"pD Candle"},{key:"pDClose",label:"pD Close"},
  {key:"h4Candle",label:"H4 Candle"},{key:"h4Close",label:"H4 Close"},
  {key:"h1Structure",label:"H1 Structure"},{key:"m30Structure",label:"M30 Structure"},
  {key:"bias",label:"Bias"},
  {key:"tradeIdea1",label:"Trade Idea 1"},{key:"tradeIdea2",label:"Trade Idea 2"},
  {key:"tradeIdea3",label:"Trade Idea 3"},{key:"tradeIdea4",label:"Trade Idea 4"},
  {key:"chart",label:"Chart Notes"}
];
var WEEKLY_FIELDS=[
  {key:"weekBias",label:"Weekly Bias"},{key:"goldBias",label:"GOLD Bias"},
  {key:"nasBias",label:"NASDAQ Bias"},{key:"keyLevels",label:"Key S/R Levels"},
  {key:"outlook",label:"Week Outlook"},{key:"notes",label:"Notes"}
];

function loadData(){
  try{var s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return{daily:{XAUUSD:[],NASDAQ:[]},weekly:[],trades:[]};
}
var state={section:"daily",activePair:"XAUUSD",view:"list",editItem:null,detailItem:null,detailIdx:-1,data:loadData()};
var saveTimer=null;
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(function(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data));},500);}
function setState(u){for(var k in u)state[k]=u[k];render();}

function todayStr(){var d=new Date();return(d.getMonth()+1)+"/"+d.getDate();}
function currentWeek(){var d=new Date(),s=new Date(d);s.setDate(d.getDate()-d.getDay()+1);return"W"+(s.getMonth()+1)+"/"+s.getDate();}
function emptyDaily(){var o={date:todayStr()};DAILY_FIELDS.forEach(function(f){o[f.key]="";});return o;}
function emptyWeekly(){var o={week:currentWeek()};WEEKLY_FIELDS.forEach(function(f){o[f.key]="";});return o;}
function emptyTrade(){return{date:"",pair:"XAUUSD",setup:"TS1",ts1Size:"",entryType:"エントリー",ruleFollow:"⭕️",checkRate:"",result:"W",time:"",memo:"",link1:"",link2:""};}

function biasColor(b){
  if(!b)return"#3f4458";var s=b.toLowerCase();
  if(s.indexOf("full bull")>=0||s==="bullish")return"#22c55e";
  if(s.indexOf("more bull")>=0)return"#86efac";
  if(s.indexOf("full bear")>=0||s==="bearish")return"#ef4444";
  if(s.indexOf("more bear")>=0)return"#fca5a5";
  return"#94a3b8";
}
function resultColor(r){
  if(!r)return"#3f4458";
  if(r==="W"||r==="(W)")return"#22c55e";
  if(r==="L"||r==="(L)")return"#ef4444";
  if(r==="BE"||r==="(BE)")return"#f59e0b";
  return"#64748b";
}
function candleIcon(c){if(!c)return"◆";var s=c.toLowerCase();if(s.indexOf("bull")>=0)return"▲";if(s.indexOf("bear")>=0)return"▼";return"◆";}
function candleColor(c){if(!c)return"#64748b";var s=c.toLowerCase();if(s.indexOf("bull")>=0)return"#22c55e";if(s.indexOf("bear")>=0)return"#ef4444";return"#94a3b8";}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function saveDaily(item){
  var list=state.data.daily[state.activePair]||[];
  var idx=-1;for(var i=0;i<list.length;i++){if(list[i].date===item.date){idx=i;break;}}
  if(idx>=0)list[idx]=item;else list.unshift(item);
  state.data.daily[state.activePair]=list;
  save();setState({view:"list"});
}
function deleteDaily(date){state.data.daily[state.activePair]=state.data.daily[state.activePair].filter(function(e){return e.date!==date;});save();setState({view:"list"});}
function saveWeekly(item){
  var list=state.data.weekly||[];
  var idx=-1;for(var i=0;i<list.length;i++){if(list[i].week===item.week){idx=i;break;}}
  if(idx>=0)list[idx]=item;else list.unshift(item);
  state.data.weekly=list;save();setState({view:"list"});
}
function deleteWeekly(week){state.data.weekly=state.data.weekly.filter(function(e){return e.week!==week;});save();setState({view:"list"});}
function saveTrade(item){
  var idx=item._id;var clean={};for(var k in item){if(k!=="__id"&&k!=="_id")clean[k]=item[k];}
  if(idx>=0)state.data.trades[idx]=clean;else state.data.trades.unshift(clean);
  save();setState({view:"list"});
}
function deleteTrade(idx){state.data.trades=state.data.trades.filter(function(_,i){return i!==idx;});save();setState({view:"list"});}

// Image storage
function getImages(){try{var s=localStorage.getItem(IMG_KEY);return s?JSON.parse(s):{}}catch(e){return{};}}
function saveImage(key,slot,data){var imgs=getImages();if(!imgs[key])imgs[key]={};imgs[key][slot]=data;localStorage.setItem(IMG_KEY,JSON.stringify(imgs));}
function deleteImage(key,slot){var imgs=getImages();if(imgs[key])delete imgs[key][slot];localStorage.setItem(IMG_KEY,JSON.stringify(imgs));}
function imgKey(sec,pair,id){return sec+"__"+(pair||"")+"__"+id;}
function safeId(s){return s.replace(/[^a-z0-9]/gi,"_");}

function renderUploadedImages(eKey){
  var imgs=getImages()[eKey]||{};var html="";
  for(var slot in imgs){
    html+='<div style="margin-bottom:10px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
    html+='<span class="lbl" style="margin:0;">CHART IMAGE '+slot+'</span>';
    html+='<button onclick="deleteImage(\''+eKey+'\',\''+slot+'\');render();" style="font-size:9px;color:#f87171;background:transparent;border:1px solid #7f1d1d;padding:2px 8px;cursor:pointer;">削除</button>';
    html+='</div>';
    html+='<img src="'+imgs[slot]+'" style="width:100%;max-height:340px;object-fit:contain;border:1px solid #1e293b;background:#0d1117;display:block;">';
    html+='</div>';
  }
  return html;
}

function imgUploadBtn(eKey){
  var sid=safeId(eKey);
  return '<div style="margin-top:12px;">'+
    '<label class="lbl">チャート画像 (JPEG/PNG)</label>'+
    '<label style="display:inline-block;padding:7px 16px;background:transparent;border:1px solid #334155;color:#94a3b8;font-size:10px;letter-spacing:2px;cursor:pointer;">'+
    '+ 画像を追加'+
    '<input type="file" accept="image/*" multiple style="display:none;" onchange="handleImgUpload(event,\''+eKey+'\')">'+
    '</label>'+
    '<div id="ip-'+sid+'" style="margin-top:8px;">'+renderUploadedImages(eKey)+'</div>'+
    '</div>';
}

window.handleImgUpload=function(evt,eKey){
  var files=Array.prototype.slice.call(evt.target.files);
  var sid=safeId(eKey);
  files.forEach(function(file){
    var r=new FileReader();
    r.onload=function(e){
      var imgs=getImages()[eKey]||{};var slot=1;while(imgs[slot])slot++;
      saveImage(eKey,slot,e.target.result);
      var el=document.getElementById("ip-"+sid);
      if(el)el.innerHTML=renderUploadedImages(eKey);
    };
    r.readAsDataURL(file);
  });
};

function renderUrlPreview(url,idx){
  if(!url)return"";
  var isImg=/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(url);
  var isTv=/tradingview\.com\/x\//i.test(url);
  var imgSrc=isTv?url.replace(/\/?$/,"")+".png":(isImg?url:null);
  var errId="urlerr"+idx+(Math.random()*1e6|0);
  var html='<div style="margin-bottom:12px;">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
  html+='<span class="lbl" style="margin:0;">CHART '+idx+'</span>';
  html+='<a href="'+esc(url)+'" target="_blank" style="font-size:9px;color:#f59e0b;text-decoration:none;letter-spacing:1px;border:1px solid #334155;padding:3px 10px;">OPEN →</a>';
  html+='</div>';
  if(imgSrc){
    html+='<img src="'+esc(imgSrc)+'" style="width:100%;max-height:340px;object-fit:contain;border:1px solid #1e293b;background:#0d1117;display:block;" onerror="this.style.display=\'none\';document.getElementById(\''+errId+'\').style.display=\'block\'">';
    html+='<div id="'+errId+'" style="display:none;padding:8px;background:#0d1117;border:1px solid #1e293b;font-size:10px;color:#475569;">画像読み込み失敗 — <a href="'+esc(url)+'" target="_blank" style="color:#f59e0b;">リンクで開く</a></div>';
  }else{
    html+='<div style="padding:8px 12px;background:#0d1117;border:1px solid #1e293b;font-size:10px;color:#475569;word-break:break-all;">'+esc(url)+'</div>';
  }
  html+='</div>';
  return html;
}

// SVG helpers
function svgBarChart(data,keys,colors,w,h){
  w=w||560;h=h||140;
  var pl=30,pr=10,pt=10,pb=28,iw=w-pl-pr,ih=h-pt-pb;
  var maxV=1;
  data.forEach(function(d){var t=0;keys.forEach(function(k){t+=d[k]||0;});if(t>maxV)maxV=t;});
  var gap=iw/data.length;var bw=Math.min(36,gap*0.4);
  var out="";
  for(var i=0;i<=4;i++){var y=pt+ih-(i/4)*ih,v=Math.round(maxV*(i/4));out+='<line x1="'+pl+'" y1="'+y+'" x2="'+(pl+iw)+'" y2="'+y+'" stroke="#1e293b" stroke-width="1"/>';if(i>0)out+='<text x="'+(pl-4)+'" y="'+(y+4)+'" text-anchor="end" fill="#475569" font-size="9">'+v+'</text>';}
  data.forEach(function(d,i){
    var cx=pl+i*gap+gap/2;var segW=bw/keys.length;
    keys.forEach(function(k,ki){var v=d[k]||0,bh=(v/maxV)*ih;if(bh>0)out+='<rect x="'+(cx-bw/2+ki*segW)+'" y="'+(pt+ih-bh)+'" width="'+(segW-1)+'" height="'+bh+'" fill="'+colors[ki]+'" rx="2"/>';});
    out+='<text x="'+cx+'" y="'+(h-6)+'" text-anchor="middle" fill="#64748b" font-size="9">'+(d._label||"")+'</text>';
  });
  return'<svg width="100%" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">'+out+'</svg>';
}
function svgDonut(data,size){
  size=size||120;var cx=size/2,cy=size/2,R=size*0.43,r=size*0.25;
  var total=0;data.forEach(function(d){total+=d.value;});if(!total)return"";
  var paths="",angle=-Math.PI/2;
  data.forEach(function(d){
    var a=(d.value/total)*Math.PI*2;
    var x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    var x2=cx+R*Math.cos(angle+a),y2=cy+R*Math.sin(angle+a);
    var ix1=cx+r*Math.cos(angle),iy1=cy+r*Math.sin(angle);
    var ix2=cx+r*Math.cos(angle+a),iy2=cy+r*Math.sin(angle+a);
    var lg=a>Math.PI?1:0;
    paths+='<path d="M'+x1+','+y1+' A'+R+','+R+' 0 '+lg+',1 '+x2+','+y2+' L'+ix2+','+iy2+' A'+r+','+r+' 0 '+lg+',0 '+ix1+','+iy1+' Z" fill="'+d.color+'"/>';
    angle+=a;
  });
  return'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg">'+paths+'</svg>';
}
function svgLine(data,w,h){
  w=w||560;h=h||100;if(data.length<2)return"";
  var pl=30,pr=10,pt=8,pb=24,iw=w-pl-pr,ih=h-pt-pb;
  var minV=data[0].value,maxV=data[0].value;
  data.forEach(function(d){if(d.value<minV)minV=d.value;if(d.value>maxV)maxV=d.value;});
  var range=maxV-minV||1;
  var pts=data.map(function(d,i){var x=pl+(i/(data.length-1))*iw,y=pt+ih-((d.value-minV)/range)*ih;return x+","+y;}).join(" ");
  var lbls=data.map(function(d,i){var x=pl+(i/(data.length-1))*iw;return'<text x="'+x+'" y="'+(h-4)+'" text-anchor="middle" fill="#475569" font-size="8">'+d.label+'</text>';}).join("");
  var dots=data.map(function(d,i){var x=pl+(i/(data.length-1))*iw,y=pt+ih-((d.value-minV)/range)*ih;return'<circle cx="'+x+'" cy="'+y+'" r="3" fill="#f59e0b"/>';}).join("");
  return'<svg width="100%" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><polyline points="'+pts+'" fill="none" stroke="#f59e0b" stroke-width="2"/>'+dots+lbls+'</svg>';
}

function renderCharts(){
  var trades=state.data.trades||[];
  var actual=trades.filter(function(t){return t.entryType==="エントリー"||t.entryType==="テスト";});
  var rc={W:0,L:0,BE:0};
  actual.forEach(function(t){var r=(t.result||"").replace(/[()]/g,"");if(rc[r]!==undefined)rc[r]++;});
  var total=actual.length;
  var comply=actual.filter(function(t){return t.ruleFollow==="⭕️";}).length;
  var compRate=total?Math.round(comply/total*100):0;
  var compColor=compRate>=80?"#22c55e":compRate>=60?"#f59e0b":"#ef4444";
  var setupMap={};
  actual.forEach(function(t){var s=(t.setup||"?").replace(/[()]/g,"");if(!setupMap[s])setupMap[s]={_label:s,W:0,L:0,BE:0};var r=(t.result||"").replace(/[()]/g,"");if(setupMap[s][r]!==undefined)setupMap[s][r]++;});
  var pairMap={};
  actual.forEach(function(t){var p=t.pair||"—";if(!pairMap[p])pairMap[p]={_label:p,W:0,L:0,BE:0};var r=(t.result||"").replace(/[()]/g,"");if(pairMap[p][r]!==undefined)pairMap[p][r]++;});
  var checkData=actual.filter(function(t){return t.checkRate;}).map(function(t){return{label:t.date,value:parseInt(t.checkRate)||0};});
  var pieSlices=[{value:rc.W,color:"#22c55e"},{value:rc.L,color:"#ef4444"},{value:rc.BE,color:"#f59e0b"}].filter(function(d){return d.value>0;});
  var legend=[{n:"W",c:"#22c55e",v:rc.W},{n:"L",c:"#ef4444",v:rc.L},{n:"BE",c:"#f59e0b",v:rc.BE}].map(function(d){return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><div style="width:8px;height:8px;background:'+d.c+';border-radius:50%;"></div><span style="font-size:11px;color:#94a3b8;">'+d.n+'</span><span style="font-size:14px;color:#e2e8f0;font-weight:700;margin-left:4px;">'+d.v+'</span></div>';}).join("");
  var setupArr=[];for(var k in setupMap)setupArr.push(setupMap[k]);
  var pairArr=[];for(var k in pairMap)pairArr.push(pairMap[k]);
  return'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">'+
    '<div class="chart-card"><div class="chart-title">Result Breakdown</div><div style="display:flex;align-items:center;gap:20px;">'+svgDonut(pieSlices,120)+'<div>'+legend+'<div style="font-size:10px;color:#475569;margin-top:4px;">Total: '+total+'</div></div></div></div>'+
    '<div class="chart-card"><div class="chart-title">Rule Compliance</div><div style="font-size:34px;font-weight:900;color:'+compColor+';">'+compRate+'<span style="font-size:16px;color:#64748b;">%</span></div><div style="background:#1e293b;height:6px;border-radius:3px;margin:10px 0;"><div style="height:6px;border-radius:3px;width:'+compRate+'%;background:'+compColor+';"></div></div><div style="font-size:10px;color:#475569;">'+comply+' / '+total+' rule-compliant</div></div>'+
    '</div>'+
    '<div class="chart-card"><div class="chart-title">Setup Performance</div>'+(setupArr.length?svgBarChart(setupArr,["W","L","BE"],["#22c55e","#ef4444","#f59e0b"]):'<div class="empty">NO DATA</div>')+'</div>'+
    '<div class="chart-card"><div class="chart-title">Pair Performance</div>'+(pairArr.length?svgBarChart(pairArr,["W","L","BE"],["#22c55e","#ef4444","#f59e0b"]):'<div class="empty">NO DATA</div>')+'</div>'+
    (checkData.length>1?'<div class="chart-card"><div class="chart-title">Check Rate Trend</div>'+svgLine(checkData)+'</div>':"");
}

function renderList(){
  var sec=state.section,pair=state.activePair,data=state.data;
  var hdr=function(c,l){return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><span style="font-size:9px;color:#475569;letter-spacing:3px;text-transform:uppercase;">'+c+' '+l+'</span><button class="btn-primary" onclick="openNew()">+ NEW</button></div>';};
  if(sec==="daily"){
    var list=data.daily[pair]||[];
    return hdr(list.length,"ENTRIES")+(list.length===0?'<div class="empty">NO ENTRIES</div>':list.map(function(e,i){return'<div class="card" onclick="openDetail('+i+')"><div style="display:grid;grid-template-columns:70px 1fr 1fr 110px;gap:12px;align-items:center;"><span style="font-size:13px;color:#f59e0b;letter-spacing:1px;">'+e.date+'</span><span style="font-size:10px;color:'+candleColor(e.pDCandle)+';">'+candleIcon(e.pDCandle)+' '+(e.pDCandle||"—")+'</span><span style="font-size:10px;color:#64748b;">H4: '+(e.h4Candle||"—")+'</span>'+(e.bias?'<span style="font-size:8px;letter-spacing:1px;font-weight:700;text-align:center;padding:2px 8px;background:'+biasColor(e.bias)+';color:#0a0a0f;text-transform:uppercase;">'+e.bias+'</span>':'<span></span>')+'</div></div>';}).join(""));
  }
  if(sec==="weekly"){
    var list=data.weekly||[];
    return hdr(list.length,"WEEKS")+(list.length===0?'<div class="empty">NO ENTRIES</div>':list.map(function(e,i){return'<div class="card" onclick="openDetail('+i+')"><div style="display:grid;grid-template-columns:100px 1fr 1fr;gap:12px;align-items:center;"><span style="font-size:13px;color:#f59e0b;letter-spacing:1px;">'+e.week+'</span><span style="font-size:10px;color:#64748b;">GOLD: '+(e.goldBias||"—")+'</span><span style="font-size:10px;color:#64748b;">NAS: '+(e.nasBias||"—")+'</span></div></div>';}).join(""));
  }
  if(sec==="trades"){
    var list=data.trades||[];
    // 日付を数値化してソート（新しい順）
    function dateVal(d){var m=String(d||"").match(/(\d+)\/(\d+)/);return m?(parseInt(m[1])*100+parseInt(m[2])):0;}
    var sorted=list.slice().sort(function(a,b){return dateVal(b.date)-dateVal(a.date);});
    // openDetailはsortedのインデックスではなくoriginal配列のインデックスが必要

// Calculator
var calc={pair:"MGC",accountBalance:"50000",riskPct:"1",slTicks:"",entryPrice:"",slPrice:"",contracts:""};
var INSTRUMENTS={
  MGC:{name:"Micro Gold",tickSize:0.10,tickValue:1.00,maxContracts:50,priceUnit:"$/oz"},
  MNQ:{name:"Micro Nasdaq",tickSize:0.25,tickValue:0.50,maxContracts:50,priceUnit:"pts"}
};
function calcTicks(){
  var ins=INSTRUMENTS[calc.pair];
  if(calc.slTicks.trim())return parseFloat(calc.slTicks);
  if(calc.entryPrice.trim()&&calc.slPrice.trim()){var d=Math.abs(parseFloat(calc.entryPrice)-parseFloat(calc.slPrice));if(!isNaN(d))return Math.round(d/ins.tickSize);}
  return null;
}
// calcUpdateResults: 結果部分だけ更新（inputはそのまま保持）
function calcUpdateResults(){
  var ins=INSTRUMENTS[calc.pair];
  var balance=parseFloat(calc.accountBalance)||0;
  var riskPct=parseFloat(calc.riskPct)||0;
  var riskUSD=balance*riskPct/100;
  var ticks=calcTicks();
  var slPC=ticks!=null?ticks*ins.tickValue:null;
  var optC=slPC?Math.floor(riskUSD/slPC):null;
  var capped=optC!=null?Math.min(optC,ins.maxContracts):null;
  var actualRisk=(capped!=null&&slPC!=null)?capped*slPC:null;
  var manC=calc.contracts.trim()?parseInt(calc.contracts):null;
  var manRisk=(manC&&slPC)?manC*slPC:null;
  var overLimit=optC!=null&&optC>ins.maxContracts;
  var row=function(l,v,c){return'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0d1117;border:1px solid #1e293b;margin-bottom:4px;"><span style="font-size:10px;color:#475569;letter-spacing:1px;">'+l+'</span><span style="font-size:13px;font-weight:700;color:'+(c||"#e2e8f0")+';">'+v+'</span></div>';};
  var simRows=(capped&&slPC)?[{label:"1:1",rr:1},{label:"1:1.5",rr:1.5},{label:"1:2",rr:2},{label:"1:3",rr:3}].map(function(r){return{label:r.label,rr:r.rr,win:capped*slPC*r.rr,loss:capped*slPC};}):[];

  // SL hint
  var slHint=document.getElementById("calc-sl-hint");
  if(slHint)slHint.innerHTML=ticks!=null?'→ SL = '+ticks+' ticks = $'+(ticks*ins.tickValue).toFixed(2)+'/contract':"";

  // Results block
  var resEl=document.getElementById("calc-results");
  if(resEl){
    var h=row("Risk Amount (USD)","$"+riskUSD.toFixed(2),"#e2e8f0");
    if(slPC!=null)h+=row("SL ($/contract)","$"+slPC.toFixed(2));
    if(capped!=null)h+=row("最適コントラクト数",capped+" contracts",overLimit?"#f59e0b":"#22c55e");
    if(overLimit)h+='<div style="padding:8px 14px;background:#451a03;border:1px solid #92400e;font-size:10px;color:#f59e0b;margin-bottom:4px;">⚠ 理論値 '+optC+' → Topstep上限により '+ins.maxContracts+' にキャップ</div>';
    if(actualRisk!=null)h+=row("実際のリスク額","$"+actualRisk.toFixed(2)+(overLimit?" (上限適用後)":""),overLimit?"#f87171":"#94a3b8");
    resEl.innerHTML=h;
  }

  // Manual check result
  var manEl=document.getElementById("calc-manual-result");
  if(manEl){
    var mh="";
    if(manRisk!=null)mh+='<div style="font-size:12px;color:'+(manRisk>riskUSD?"#f87171":"#22c55e")+';">リスク: <strong>$'+manRisk.toFixed(2)+'</strong> '+(manRisk>riskUSD?"⚠ 超過":"✓ OK")+'</div>';
    if(manC&&manC>ins.maxContracts)mh+='<div style="font-size:10px;color:#f87171;">⚠ Topstep上限 ('+ins.maxContracts+') 超過</div>';
    manEl.innerHTML=mh;
  }

  // Sim table
  var simEl=document.getElementById("calc-sim");
  if(simEl){
    if(simRows.length){
      var sh='<div class="lbl" style="margin-bottom:10px;">損益シミュレーション ('+capped+' contracts)</div>';
      sh+='<div style="border:1px solid #1e293b;overflow:hidden;"><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:#0d1117;padding:8px 14px;border-bottom:1px solid #1e293b;"><span style="font-size:9px;color:#475569;letter-spacing:2px;">RR</span><span style="font-size:9px;color:#475569;letter-spacing:2px;">WIN</span><span style="font-size:9px;color:#475569;letter-spacing:2px;">LOSS</span><span style="font-size:9px;color:#475569;letter-spacing:2px;">WIN RATE NEEDED</span></div>';
      simRows.forEach(function(r){sh+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:10px 14px;border-bottom:1px solid #1e293b;align-items:center;"><span style="font-size:11px;color:#94a3b8;">'+r.label+'</span><span style="font-size:12px;color:#22c55e;font-weight:700;">+$'+r.win.toFixed(0)+'</span><span style="font-size:12px;color:#ef4444;font-weight:700;">-$'+r.loss.toFixed(0)+'</span><span style="font-size:11px;color:#64748b;">'+Math.round(1/(1+r.rr)*100)+'%</span></div>';});
      sh+='</div>';
      simEl.innerHTML=sh;
    }else{
      simEl.innerHTML="";
    }
  }
}

function renderInsights(){
  var trades=state.data.trades||[];
  var actual=trades.filter(function(t){return t.entryType==="エントリー"||t.entryType==="テスト";});
  if(!actual.length)return'<div class="empty">事実ログにトレードを追加するとここに分析が表示されます</div>';

  // Normalize result: W / L / BE
  function baseResult(r){return(r||"").replace(/[()]/g,"");}

  // Split good/bad text into bullet fragments (split by 。/、/・/\n)
  function fragments(text){
    if(!text)return[];
    return text.split(/[。、・\n\/]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>1;});
  }

  // Collect all entries for a given result bucket
  function bucket(result){
    return actual.filter(function(t){return baseResult(t.result)===result;});
  }

  // Frequency map of fragments from a field across a set of trades
  function freqMap(tradeSet, field){
    var map={};
    tradeSet.forEach(function(t){
      fragments(t[field]).forEach(function(f){
        map[f]=(map[f]||0)+1;
      });
    });
    return map;
  }

  // Sort map to array [{text,count}]
  function sortedFreq(map){
    return Object.keys(map).map(function(k){return{text:k,count:map[k]};}).sort(function(a,b){return b.count-a.count;});
  }

  var wins=bucket("W"), losses=bucket("L"), bes=bucket("BE");

  // --- Section builder ---
  function freqSection(title, color, bgColor, items, emptyMsg){
    if(!items.length)return'<div style="font-size:10px;color:#334155;padding:8px 0;">'+emptyMsg+'</div>';
    return items.slice(0,10).map(function(item){
      var pct=Math.round((item.count/actual.length)*100);
      var barW=Math.min(100,Math.round((item.count/items[0].count)*100));
      return'<div style="margin-bottom:8px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">'+

var AI_STORAGE_KEY="fx-ai-analysis-v1";

window.aiAnalyze=function(){

    if(t.good)row+=" 良:"+t.good.replace(/\n/g," ");

  }).join("\n");

    +"【良かった点 — 共通パターン TOP5】\n"
    +"似たような成功・良い習慣をグルーピングして要約。各グループに件数と短い具体例を添えて。\n\n"
    +"【総合コメント】\n"
    +"このトレーダーの課題と強みを2〜3文で。";

var WR_KEY="fx-weekly-review-v1";
var WR_PAIRS=["XAUUSD","NASDAQ","US30"];

// 米国・日本の祝日 (2026年、M/D形式)
var HOLIDAYS_2026=[
  "1/1","1/12","1/19","2/11","2/16","2/23","3/20","4/29",
  "5/3","5/4","5/5","5/18","7/20","8/11","9/21","9/23",
  "10/12","11/3","11/23","12/23",
  // US holidays
  "1/19","2/16","5/25","7/3","9/7","11/26","12/25"
];

function isHolidayOrWeekend(dateStr){
  var m=String(dateStr||"").match(/(\d+)\/(\d+)/);
  if(!m)return true;
  var d=new Date(2026,parseInt(m[1])-1,parseInt(m[2]));
  var dow=d.getDay();
  if(dow===0||dow===6)return true;
  for(var i=0;i<HOLIDAYS_2026.length;i++){
    var hm=HOLIDAYS_2026[i].match(/(\d+)\/(\d+)/);
    if(hm&&parseInt(hm[1])===parseInt(m[1])&&parseInt(hm[2])===parseInt(m[2]))return true;
  }
  return false;
}

// 週の月〜金の平日リストを返す
function getWeekdays(weekStartStr){
  var m=String(weekStartStr||"").replace(/^W/,"").match(/(\d+)\/(\d+)/);
  if(!m)return[];
  var days=[];
  var start=new Date(2026,parseInt(m[1])-1,parseInt(m[2]));
  // 月曜に合わせる
  var dow=start.getDay();
  var diff=dow===0?1:dow===1?0:-(dow-1);
  start.setDate(start.getDate()+diff);
  for(var i=0;i<5;i++){
    var d=new Date(start);d.setDate(start.getDate()+i);
    days.push((d.getMonth()+1)+"/"+(d.getDate()));
  }
  return days;
}

function loadWeeklyReviews(){
  try{var s=localStorage.getItem(WR_KEY);if(s)return JSON.parse(s);}catch(e){}
  return [];
}
function saveWeeklyReviews(arr){localStorage.setItem(WR_KEY,JSON.stringify(arr));}

function emptyWR(weekStr){
  var pairSummaries={};
  WR_PAIRS.forEach(function(p){pairSummaries[p]="";});
  return{week:weekStr||"",totalTrades:0,ruleRate:"",ts1Count:"",ts2Count:"",noTradeCount:"",verdict:"合格",good:"",bad:"",nextWeek:"",pairSummaries:pairSummaries};
}

// 事実ログから週の統計を自動計算
function calcWeekStats(weekStr){
  var trades=state.data.trades||[];
  var weekdays=getWeekdays(weekStr);
  if(!weekdays.length)return null;

  // その週のトレード
  var weekTrades=trades.filter(function(t){
    return weekdays.indexOf(t.date)>=0;
  });
  var actual=weekTrades.filter(function(t){
    return t.entryType==="エントリー"||t.entryType==="テスト";
  });
  var ts1=weekTrades.filter(function(t){return(t.setup||"").replace(/[()]/g,"").trim()==="TS1";}).length;
  var ts2=weekTrades.filter(function(t){return(t.setup||"").replace(/[()]/g,"").trim()==="TS2";}).length;
  var withRule=actual.filter(function(t){return t.ruleFollow==="⭕️";});
  var ruleRate=actual.length?Math.round(withRule.length/actual.length*100):null;

  // W/L/BE集計（括弧付きも含む）
  var wCount=actual.filter(function(t){return(t.result||"").replace(/[()]/g,"")==="W";}).length;
  var lCount=actual.filter(function(t){return(t.result||"").replace(/[()]/g,"")==="L";}).length;
  var beCount=actual.filter(function(t){return(t.result||"").replace(/[()]/g,"")==="BE";}).length;
  var winRate=actual.length?Math.round(wCount/actual.length*100):null;

  // NO TRADE日：平日でトレード記録がない日（祝日除く）
  var tradedDays={};
  weekTrades.forEach(function(t){tradedDays[t.date]=true;});
  var noTradeDays=weekdays.filter(function(d){
    return!isHolidayOrWeekend(d)&&!tradedDays[d];
  });

  return{
    totalTrades:actual.length,
    ruleRate:ruleRate!=null?ruleRate+"%":"",
    ts1Count:ts1,
    ts2Count:ts2,
    noTradeCount:noTradeDays.length,
    noTradeDays:noTradeDays,
    wCount:wCount,
    lCount:lCount,
    beCount:beCount,
    winRate:winRate
  };
}

function renderWeeklyReview(){
  var reviews=loadWeeklyReviews();
  if(wrState.view==="form")return renderWRForm();
  if(wrState.view==="detail")return renderWRDetail();

  // list
  var hdr='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">'+
    '<span style="font-size:9px;color:#475569;letter-spacing:3px;">'+reviews.length+' WEEKS</span>'+
    '<button class="btn-primary" onclick="wrOpenNew()">+ NEW WEEK</button></div>';

  if(!reviews.length)return hdr+'<div class="empty">週次レビューがありません</div>';

  // sort newest first
  var sorted=reviews.slice().sort(function(a,b){
    var am=String(a.week).replace(/^W/,"").match(/(\d+)\/(\d+)/);
    var bm=String(b.week).replace(/^W/,"").match(/(\d+)\/(\d+)/);
    if(!am||!bm)return 0;
    return(parseInt(bm[1])*100+parseInt(bm[2]))-(parseInt(am[1])*100+parseInt(am[2]));
  });

  var rows=sorted.map(function(r){
    var idx=reviews.indexOf(r);
    var verdictColor=r.verdict==="合格"?"#22c55e":"#ef4444";
    var stats=calcWeekStats(r.week);
    var autoTotal=stats?stats.totalTrades:"-";
    var autoNoTrade=stats?stats.noTradeCount:"-";
    return'<div class="card" onclick="wrOpenDetail('+idx+')">'+
      '<div style="display:grid;grid-template-columns:80px 60px 60px 60px 80px 1fr;gap:10px;align-items:center;">'+
      '<span style="font-size:13px;color:#f59e0b;letter-spacing:1px;">'+esc(r.week)+'</span>'+
      '<span style="font-size:10px;color:#94a3b8;">'+autoTotal+'件</span>'+
      '<span style="font-size:10px;color:#64748b;">休'+autoNoTrade+'日</span>'+
      '<span style="font-size:10px;color:#64748b;">'+(r.ruleRate||stats&&stats.ruleRate||"—")+'</span>'+
      '<span style="font-size:10px;font-weight:700;color:'+verdictColor+';">'+esc(r.verdict||"")+'</span>'+
      '<span style="font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(r.good||"")+'</span>'+
      '</div></div>';
  }).join("");

  return hdr+rows;
}

function buildWrAiCard(weekStr){
  var key="fx-wr-ai-"+weekStr.replace(/[^a-zA-Z0-9]/g,"_");
  var saved=null;
  try{var s=localStorage.getItem(key);if(s)saved=JSON.parse(s);}catch(e){}
  var dateLabel=saved?'<div style="font-size:9px;color:#334155;margin-top:2px;">更新日: '+esc(saved.date)+'</div>':'';
  var body=saved
    ?'<div style="color:#cbd5e1;white-space:pre-wrap;">'+esc(saved.text)+'</div>'
     +'<div style="margin-top:8px;font-size:9px;color:#334155;border-top:1px solid #1e293b;padding-top:6px;">更新日: '+esc(saved.date)+'</div>'
    :'プロンプトをコピーして Claude.ai に貼り付け、回答を下の欄に保存してください。';
  var weekEsc=esc(weekStr);
  return '<div class="chart-card" style="border-color:#6366f144;margin-top:14px;">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    +'<div><div class="chart-title" style="color:#a5b4fc;">✦ AI週次分析</div>'+dateLabel+'</div>'
    +'<button onclick="wrAiCopy(this)" data-week="'+weekEsc+'" style="padding:6px 14px;background:#6366f1;border:none;color:#fff;font-size:10px;letter-spacing:1px;cursor:pointer;font-weight:700;">プロンプトをコピー</button>'
    +'</div>'
    +'<div id="wr-ai-result" style="font-size:11px;color:#475569;line-height:1.9;">'+body+'</div>'
    +'</div>';
}

window.wrAiCopy=function(btn){
  var weekStr=btn.getAttribute("data-week");
  var el=document.getElementById("wr-ai-result");
  if(!el||!weekStr)return;
  var el=document.getElementById("wr-ai-result");
  if(!el)return;

  // その週のトレードを取得
  var trades=state.data.trades||[];
  var weekdays=getWeekdays(weekStr);
  var weekTrades=trades.filter(function(t){
    return (t.entryType==="エントリー"||t.entryType==="テスト")&&weekdays.indexOf(t.date)>=0;
  });

  // 前週データ（レビュー一覧から直前の週を探す）
  var reviews=loadWeeklyReviews();
  var prevReview=null;
  var weekVal=function(w){var m=String(w).replace(/^W/,"").match(/(\d+)\/(\d+)/);return m?parseInt(m[1])*100+parseInt(m[2]):0;};
  var thisVal=weekVal(weekStr);
  var prevVal=0;
  reviews.forEach(function(rv){
    var v=weekVal(rv.week);
    if(v<thisVal&&v>prevVal){prevVal=v;prevReview=rv;}
  });

  // 今週トレード行
  var tradeLines=weekTrades.length
    ?weekTrades.map(function(t){
      var row="["+t.date+" "+(t.pair||"")+" "+(t.setup||"")+" "+(t.result||"")+"]";
      if(t.memo)row+=" メモ:"+t.memo.replace(/\n/g," ");
      if(t.good)row+=" 良:"+t.good.replace(/\n/g," ");
      if(t.bad)row+=" 悪:"+t.bad.replace(/\n/g," ");
      return row;
    }).join("\n")
    :"（この週のトレード記録なし）";

  // 前週情報
  var prevStr=prevReview
    ?"前週（"+prevReview.week+"）の記録:\n"
      +"  判定: "+(prevReview.verdict||"—")+"\n"
      +"  よかったこと: "+(prevReview.good||"—")+"\n"
      +"  悪かったこと: "+(prevReview.bad||"—")+"\n"
      +"  来週への目標: "+(prevReview.nextWeek||"—")
    :"（前週のレビューデータなし）";

  // 今週のレビューメモ
  var r=wrState.editItem||{};
  var reviewMemo="今週の手動メモ:\n"
    +"  よかったこと: "+(r.good||"—")+"\n"
    +"  悪かったこと: "+(r.bad||"—")+"\n"
    +"  来週への目標: "+(r.nextWeek||"—");

  var prompt="以下は私のFXトレード週次レビューです。\n\n"
    +"■ 今週（"+weekStr+"）のトレード記録:\n"+tradeLines+"\n\n"
    +"■ "+reviewMemo+"\n\n"
    +"■ "+prevStr+"\n\n"
    +"この情報をもとに、以下を日本語で出力してください。\n\n"
    +"【今週の悪かった点 — パターン分析】\n"
    +"今週のトレードで見られた失敗・課題をグルーピングして要約。具体的なトレードを例に。\n\n"
    +"【今週の良かった点 — パターン分析】\n"
    +"今週のトレードで見られた成功・良い習慣を要約。具体的なトレードを例に。\n\n"
    +"【前週との比較】\n"
    +"前週の目標・課題と比べて、今週何が改善されたか、何がまだ課題かを具体的に。\n\n"
    +"【総合評価と来週へのアドバイス】\n"
    +"今週の総合評価と、来週特に意識すべき1〜2点を簡潔に。";


  function showPasteUI(copied){
    var wrAiKey="fx-wr-ai-"+weekStr.replace(/[^a-zA-Z0-9]/g,"_");
    el.innerHTML=
      '<div style="padding:14px;background:#0a0e15;border:1px solid #6366f144;">'
      +(copied
        ?'<div style="font-size:10px;color:#22c55e;letter-spacing:2px;margin-bottom:10px;">✓ コピー完了（'+weekTrades.length+'件のトレード）</div>'
        :'<div style="font-size:10px;color:#f59e0b;margin-bottom:8px;">手動でコピーしてください（Ctrl+A → Ctrl+C）</div>'
         +'<textarea style="width:100%;height:80px;background:#111827;border:1px solid #334155;color:#94a3b8;font-size:10px;padding:8px;resize:vertical;margin-bottom:10px;" readonly onclick="this.select()">'+prompt.replace(/&/g,"&amp;").replace(/</g,"&lt;")+'</textarea>')
      +'<div style="font-size:11px;color:#94a3b8;line-height:1.9;margin-bottom:10px;">'
      +'① Claude.aiに貼り付けて送信<br>② 回答を下の欄に貼り付けて保存'
      +'</div>'
      +'<div style="font-size:9px;color:#475569;letter-spacing:1px;margin-bottom:6px;">▼ Claudeの回答をここに貼り付け</div>'
      +'<textarea id="wr-ai-paste" class="inp" rows="10" style="width:100%;resize:vertical;font-size:11px;line-height:1.8;" placeholder="Claudeの分析結果をここに貼り付け..."></textarea>'
      +'<button onclick="wrAiSave(this)" data-week="'+weekStr+'"" style="margin-top:10px;width:100%;padding:10px;background:#6366f1;border:none;color:#fff;font-size:10px;letter-spacing:2px;cursor:pointer;font-weight:700;">保存する</button>'
      +'<div id="wr-ai-status" style="margin-top:8px;font-size:10px;color:#475569;"></div>'
      +'</div>';
  }

  navigator.clipboard.writeText(prompt)
    .then(function(){showPasteUI(true);})
    .catch(function(){showPasteUI(false);});
};

window.wrAiSave=function(btn){
  var weekStr=btn.getAttribute("data-week");
  var area=document.getElementById("wr-ai-paste");
  var status=document.getElementById("wr-ai-status");
  if(!area)return;
  var text=area.value.trim();
  if(!text){if(status){status.style.color="#f87171";status.textContent="テキストが空です。";}return;}
  var now=new Date();
  var dateStr=now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()
    +" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  var wrAiKey="fx-wr-ai-"+weekStr.replace(/[^a-zA-Z0-9]/g,"_");
  localStorage.setItem(wrAiKey,JSON.stringify({text:text,date:dateStr}));
  if(status){status.style.color="#22c55e";status.textContent="✓ 保存しました（"+dateStr+"）";}
  var el=document.getElementById("wr-ai-result");
  if(el){
    setTimeout(function(){
      el.innerHTML=
        '<div style="color:#cbd5e1;white-space:pre-wrap;">'+esc(text)+'</div>'
        +'<div style="margin-top:8px;font-size:9px;color:#334155;border-top:1px solid #1e293b;padding-top:6px;">更新日: '+dateStr+'</div>'
        +'<button onclick="wrAiCopy(this)" data-week="'+esc(weekStr)+'" style="margin-top:8px;padding:5px 14px;background:transparent;border:1px solid #6366f1;color:#a5b4fc;font-size:10px;cursor:pointer;">再コピー（更新用）</button>';
    },800);
  }
};

    var statRow=document.getElementById("wr-stat-row");
    if(statRow)statRow.innerHTML=
      '<div style="padding:10px 12px;background:#0a0e15;border:1px solid #334155;"><div class="lbl">総トレード数</div><div style="font-size:18px;font-weight:700;color:#e2e8f0;">'+stats.totalTrades+'</div></div>'+
      '<div style="padding:10px 12px;background:#0a0e15;border:1px solid #334155;"><div class="lbl">TS1回数</div><div style="font-size:18px;font-weight:700;color:#e2e8f0;">'+stats.ts1Count+'</div></div>'+
      '<div style="padding:10px 12px;background:#0a0e15;border:1px solid #334155;"><div class="lbl">TS2回数</div><div style="font-size:18px;font-weight:700;color:#e2e8f0;">'+stats.ts2Count+'</div></div>'+
      '<div style="padding:10px 12px;background:#0a0e15;border:1px solid #334155;"><div class="lbl">ルール遵守率</div><div style="font-size:18px;font-weight:700;color:#e2e8f0;">'+(stats.ruleRate||"—")+'</div></div>';
  }
};
window.wrOpenNew=function(){
  wrState.editItem=emptyWR();wrState.view="form";wrState.isNew=true;setState({});
};
window.wrOpenDetail=function(idx){
  var reviews=loadWeeklyReviews();
  wrState.editItem=JSON.parse(JSON.stringify(reviews[idx]));
  wrState.detailIdx=idx;wrState.view="detail";setState({});
};
window.wrDoSave=function(){
  var reviews=loadWeeklyReviews();
  var r=wrState.editItem;
  if(wrState.isNew){
    reviews.unshift(r);
  }else{
    reviews[wrState.detailIdx]=r;
  }
  saveWeeklyReviews(reviews);
  wrState.view="list";setState({});
};
window.wrDoDelete=function(){
  if(!confirm("削除しますか？"))return;
  var reviews=loadWeeklyReviews();
  reviews.splice(wrState.detailIdx,1);
  saveWeeklyReviews(reviews);
  wrState.view="list";setState({});
};

function render(){
  var sec=state.section,pair=state.activePair,view=state.view;
  var isCalc=sec==="calc";
  var navTabs=[["daily","日次分析"],["weekly","週次分析"],["trades","事実ログ"],["wreview","週次レビュー"],["charts","チャート"],["insights","トレード分析"],["checklist","チェックリスト"],["calc","ポジション計算"]].map(function(x){return'<button class="nav-btn'+(sec===x[0]?" active":"")+'" onclick="setSection(\''+x[0]+'\')">'+x[1]+'</button>';}).join("");
  var pairTabs=sec==="daily"?'<div style="margin-left:auto;display:flex;border-left:1px solid #1e293b;">'+PAIRS.map(function(p){return'<button class="pair-btn'+(pair===p?" active":"")+'" onclick="setPair(\''+p+'\')">'+p+'</button>';}).join("")+'</div>':"";
  var content=isCalc?'<div id="calc-root"></div>':sec==="charts"?renderCharts():sec==="insights"?renderInsights():sec==="checklist"?renderChecklist():sec==="wreview"?renderWeeklyReview():view==="list"?renderList():view==="form"?renderForm():view==="detail"?renderDetail():"";
  document.getElementById("app").innerHTML=
    '<div style="border-bottom:1px solid #1e293b;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:#0a0e15;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;"></div><span style="font-size:11px;color:#334155;letter-spacing:4px;text-transform:uppercase;">FX Trading Log</span></div><span style="font-size:10px;color:#334155;">'+todayStr()+'</span></div>'+
    '<div style="border-bottom:1px solid #1e293b;display:flex;flex-wrap:wrap;background:#0a0e15;">'+navTabs+pairTabs+'</div>'+
    '<div style="flex:1;padding:24px;max-width:860px;margin:0 auto;width:100%;">'+content+'</div>';
  if(isCalc)renderCalc();
}
render();

</script>
</body>
</html>
